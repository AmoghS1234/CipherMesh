name: Build Android APK

on:
  push:
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses:  actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution:  temurin
          java-version:  '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name:  Install Android NDK
        run: |
          sdkmanager "ndk;27.2.12479018"

      - name: Export ANDROID_NDK_ROOT
        run: |
          echo "ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/27.2.12479018" >> $GITHUB_ENV

      - name: Install Qt (Android + Desktop)
        run: |
          python -m pip install --upgrade pip
          python -m pip install aqtinstall

          # Install Qt for Android with ALL required modules
          python -m aqt install-qt linux android 6.5.0 android_armv7 \
            --modules qtwebsockets qtquick3d \
            --outputdir $GITHUB_WORKSPACE/Qt

          # Install Qt for Desktop (host tools)
          python -m aqt install-qt linux desktop 6.5.0 gcc_64 \
            --modules qtwebsockets qtquick3d \
            --outputdir $GITHUB_WORKSPACE/Qt

      - name: Build libsodium for Android (armeabi-v7a)
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf automake libtool

          git clone --depth 1 --branch stable https://github.com/jedisct1/libsodium.git
          cd libsodium

          export NDK=$ANDROID_NDK_ROOT
          export TOOLCHAIN=$NDK/toolchains/llvm/prebuilt/linux-x86_64
          export API=21
          export TARGET=armv7a-linux-androideabi

          export CC=$TOOLCHAIN/bin/${TARGET}${API}-clang
          export CXX=$TOOLCHAIN/bin/${TARGET}${API}-clang++
          export AR=$TOOLCHAIN/bin/llvm-ar
          export RANLIB=$TOOLCHAIN/bin/llvm-ranlib
          export STRIP=$TOOLCHAIN/bin/llvm-strip

          ./autogen.sh
          ./configure \
            --host=armv7a-linux-androideabi \
            --prefix=$GITHUB_WORKSPACE/libsodium-android \
            --disable-shared \
            --enable-static \
            --with-pic

          make -j$(nproc)
          make install

      - name: Build APK
        run: |
          export ANDROID_QT=$GITHUB_WORKSPACE/Qt/6.5.0/android_armv7
          export HOST_QT=$GITHUB_WORKSPACE/Qt/6.5.0/gcc_64
          export PATH=$ANDROID_QT/bin:$HOST_QT/bin:$PATH

          export SODIUM_ROOT=$GITHUB_WORKSPACE/libsodium-android

          mkdir -p build
          cd build

          qt-cmake .. \
            -DQT_HOST_PATH=$HOST_QT \
            -DANDROID_SDK_ROOT=$ANDROID_SDK_ROOT \
            -DANDROID_NDK_ROOT=$ANDROID_NDK_ROOT \
            -DANDROID_ABI=armeabi-v7a \
            -Dsodium_INCLUDE_DIR=$SODIUM_ROOT/include \
            -Dsodium_LIBRARY_RELEASE=$SODIUM_ROOT/lib/libsodium.a

          cmake --build .  --target CipherMesh-Mobile_make_apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name:  CipherMesh-APK
          path: build/**/*.apk
          if-no-files-found:  error