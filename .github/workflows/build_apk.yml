name: Build Android APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK / NDK
        uses: android-actions/setup-android@v3

      - name: Install Qt (Android ARM64 + Desktop)
        run: |
          python -m pip install --upgrade pip
          python -m pip install aqtinstall

          echo ">>> Installing Qt Android ARM64"
          python -m aqt install-qt linux android 6.5.0 android_arm64_v8a \
            --modules qtdeclarative qtwebsockets \
            --outputdir $GITHUB_WORKSPACE/Qt

          echo ">>> Installing Qt Desktop (host tools)"
          python -m aqt install-qt linux desktop 6.5.0 gcc_64 \
            --modules qtdeclarative qtwebsockets \
            --outputdir $GITHUB_WORKSPACE/Qt

      - name: Build APK
        run: |
          export ANDROID_QT=$GITHUB_WORKSPACE/Qt/6.5.0/android_arm64_v8a
          export HOST_QT=$GITHUB_WORKSPACE/Qt/6.5.0/gcc_64

          echo "ANDROID_QT=$ANDROID_QT"
          echo "HOST_QT=$HOST_QT"

          # Fix execute permissions (required on GitHub runners)
          chmod +x $ANDROID_QT/bin/* || true
          chmod +x $HOST_QT/bin/* || true

          export PATH=$ANDROID_QT/bin:$HOST_QT/bin:$PATH
          which qt-cmake

          mkdir -p build
          cd build

          qt-cmake -S .. -B . \
            -DQT_HOST_PATH=$HOST_QT \
            -DANDROID_SDK_ROOT=$ANDROID_SDK_ROOT \
            -DANDROID_NDK_ROOT=$ANDROID_NDK_ROOT \
            -DANDROID_ABI=arm64-v8a

          cmake --build . --target apk

      - name: Locate APK (verification)
        run: |
          echo "APK files found:"
          find build -name "*.apk" -type f

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CipherMesh-APK
          path: build/**/*.apk
          if-no-files-found: error
