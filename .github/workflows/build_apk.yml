name: Build Android APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build APK
        run: |
          export ANDROID_QT=$RUNNER_WORKSPACE/Qt/6.5.0/android_armv7
          export HOST_QT=$RUNNER_WORKSPACE/Qt/6.5.0/gcc_64

          echo "Android Qt: $ANDROID_QT"
          echo "Host Qt:    $HOST_QT"

          chmod +x $ANDROID_QT/bin/* || true
          chmod +x $HOST_QT/bin/* || true

          export PATH=$ANDROID_QT/bin:$HOST_QT/bin:$PATH
          which qt-cmake

          mkdir -p build
          cd build

          qt-cmake -S .. -B . \
            -DQT_HOST_PATH=$HOST_QT \
            -DANDROID_SDK_ROOT=$ANDROID_SDK_ROOT \
            -DANDROID_NDK_ROOT=$ANDROID_NDK_ROOT \
            -DANDROID_ABI=armeabi-v7a

          cmake --build . --target apk
