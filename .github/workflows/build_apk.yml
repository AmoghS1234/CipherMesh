name: Build Android APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK / NDK
        uses: android-actions/setup-android@v3

      - name: Install Qt (Android + Desktop with WebSockets)
        run: |
          python -m pip install --upgrade pip
          python -m pip install aqtinstall

          # Qt for Android (target)
          python -m aqt install-qt linux android 6.5.0 android_armv7 \
            --modules qtwebsockets \
            --outputdir $GITHUB_WORKSPACE/Qt

          # Qt for Desktop (host tools)
          python -m aqt install-qt linux desktop 6.5.0 gcc_64 \
            --modules qtwebsockets \
            --outputdir $GITHUB_WORKSPACE/Qt

      - name: Build APK
        run: |
          export ANDROID_QT=$GITHUB_WORKSPACE/Qt/6.5.0/android_armv7
          export HOST_QT=$GITHUB_WORKSPACE/Qt/6.5.0/gcc_64

          echo "Android Qt: $ANDROID_QT"
          echo "Host Qt:    $HOST_QT"

          # Required on GitHub runners
          chmod +x $ANDROID_QT/bin/* || true
          chmod +x $HOST_QT/bin/* || true

          export PATH=$ANDROID_QT/bin:$HOST_QT/bin:$PATH

          mkdir -p build
          cd build

          qt-cmake -S .. -B . \
            -DQT_HOST_PATH=$HOST_QT \
            -DANDROID_SDK_ROOT=$ANDROID_SDK_ROOT \
            -DANDROID_NDK_ROOT=$ANDROID_NDK_ROOT \
            -DANDROID_ABI=armeabi-v7a

          # ✅ Explicit APK packaging target (required)
          cmake --build . --target CipherMesh-Mobile_make_apk

      - name: Locate APK (debug)
        run: |
          echo "Searching for APK files..."
          find build -name "*.apk" -type f

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CipherMesh-APK
          path: build/**/*.apk
          if-no-files-found: error
