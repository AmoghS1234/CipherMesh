name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.5.0'
          host: 'linux'
          target: 'android'
          arch: 'android_armv7'
          cache: 'true'

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK/NDK
        uses: android-actions/setup-android@v3

      - name: Build APK
        run: |
          # 1. Define Absolute Paths
          # The action installs Qt into ${{ runner.workspace }}/Qt/{version}/
          export ANDROID_QT=${{ runner.workspace }}/Qt/6.5.0/android_armv7
          export HOST_QT=${{ runner.workspace }}/Qt/6.5.0/gcc_64

          echo "Android Qt Location: $ANDROID_QT"
          echo "Host Qt Location: $HOST_QT"

          # 2. Fix Permissions (For BOTH Android and Host tools)
          # We force executable permissions on all binaries to prevent "Permission denied"
          chmod +x $ANDROID_QT/bin/*
          chmod +x $HOST_QT/bin/*

          # 3. Prepare Build Directory
          mkdir build
          cd build

          # 4. Configure using the full path to qt-cmake
          # We explicitly set QT_HOST_PATH so CMake knows where the Linux tools are.
          $ANDROID_QT/bin/qt-cmake -S .. -B . \
            -DQT_HOST_PATH=$HOST_QT \
            -DANDROID_SDK_ROOT=$ANDROID_SDK_ROOT \
            -DANDROID_NDK_ROOT=$ANDROID_NDK_ROOT

          # 5. Compile
          cmake --build . --target apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CipherMesh-APK
          path: build/android-build/build/outputs/apk/debug/*.apk